{{ define "main" }}

  <div class="home-intro">
    <div class="container">
      <p class="home-intro-text">这里记录我们对一件事的思考：在法国生活的华人家庭，怎样把财务的逻辑真正想清楚——不只是账户里的数字，而是那张能传给下一代的财富地图。</p>
    </div>
  </div>

  <div class="home-cta">
    <div class="container">
      {{ $posts := where .Site.RegularPages "Section" "posts" }}
      {{ $first := index ($posts.ByDate) 0 }}
      {{ with $first }}
      <a href="{{ .RelPermalink }}" class="home-cta-primary">从创刊号开始读 →</a>
      {{ end }}
      <a href="{{ "/posts/" | relURL }}" class="home-cta-secondary">所有文章</a>
    </div>
  </div>

{{ end }}

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina Method Lab — Bientôt</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f2ec;
    color: #1a1a18;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }
  .mark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 80px;
    font-weight: 300;
    color: rgba(200,169,110,0.25);
    line-height: 1;
    margin-bottom: 40px;
    letter-spacing: -0.02em;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }
  h1 span { color: #c8a96e; font-style: italic; }
  p {
    font-size: 14px;
    letter-spacing: 0.08em;
    opacity: 0.5;
    margin-bottom: 6px;
  }
  .divider {
    width: 40px; height: 1px;
    background: #c8a96e;
    margin: 36px auto;
  }
  .contact {
    font-size: 13px;
    opacity: 0.4;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>
  <div class="mark">光</div>
  <h1>Lumina <span>Method</span> Lab</h1>
  <p>Site en cours de construction</p>
  <p>网站建设中</p>
  <div class="divider"></div>
  <div class="contact">contact@luminamethod.eu</div>
</body>
</html>
